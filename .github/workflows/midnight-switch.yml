name: Přepnutí cen 
on:
  schedule:
    # 23:05 UTC = 00:05 CET (zimní čas) / 01:05 CEST (letní čas)
    - cron: "15 21 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  midnight-switch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Přepnutí next_day → current
        run: |
          python3 - <<'EOF'
          import json
          path = 'data/prices.json'
          with open(path, encoding='utf-8') as f:
              data = json.load(f)
          nd = data.get('next_day')
          if nd is not None:
              # Přesuneme next_day do current (bez valid_from — current má stejnou strukturu jako dřív)
              data['current'] = {k: v for k, v in nd.items() if k != 'valid_from'}
              data['next_day'] = None
              with open(path, 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              print(f"✓ next_day přesunuto do current (valid_from: {nd.get('valid_from', '?')})")
          else:
              print("next_day je null — žádná změna")
          EOF
      - name: Commit a push aktualizovaných dat
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/prices.json
          if git diff --staged --quiet; then
            echo "Žádné změny v datech — commit přeskočen."
          else
            git commit -m "data: přepnutí cen na nový den $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
            echo "✓ data/prices.json aktualizováno a pushnuté."
          fi
